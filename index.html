<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ADAM · 아담부동산 업무 시스템</title>
<style>
  :root {
    --ink: #16324a;
    --ink-soft: #4b6478;
    --ink-faint: #8aa0b2;
    --sky: #3d87c8;
    --sky-deep: #2b6ba5;
    --sky-tint: #e9f2fa;
    --paper: #f4f7fa;
    --card: #ffffff;
    --line: #dde6ee;
    --stamp-red: #c94f45;
    --gold: #c9a96e;
    --radius: 12px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { background: var(--paper); color: var(--ink);
    font-family: "Apple SD Gothic Neo", "Pretendard", "Malgun Gothic", "맑은 고딕", sans-serif;
    font-size: 15px; line-height: 1.5; -webkit-tap-highlight-color: transparent; }
  .num { font-family: "SF Mono", "Roboto Mono", Consolas, monospace; font-variant-numeric: tabular-nums; letter-spacing: -0.02em; }
  button { font-family: inherit; cursor: pointer; }

  /* ===== 공통 헤더 ===== */
  header { background: var(--card); border-bottom: 1px solid var(--line); position: sticky; top:0; z-index: 30; }
  .head-inner { max-width: 880px; margin: 0 auto; padding: 12px 16px; display:flex; align-items:center; gap: 12px; }
  .back-btn { border:none; background: var(--sky-tint); color: var(--sky-deep); font-weight: 700; border-radius: 8px; padding: 7px 12px; font-size: 13.5px; display:none; }
  .back-btn:hover { background: #dcebf7; }
  .head-title { font-size: 17px; font-weight: 800; letter-spacing: -0.02em; flex: 1; }
  .head-title .logo { color: var(--sky-deep); }
  .settings-gear { border:none; background:none; color: var(--ink-faint); font-size: 18px; padding: 4px 8px; border-radius: 6px; }
  .settings-gear:hover { background: var(--paper); color: var(--ink-soft); }

  main { max-width: 880px; margin: 0 auto; padding: 20px 16px 90px; }
  .view { display:none; }
  .view.active { display:block; }

  /* ===== 메인 화면 ===== */
  .hero { text-align:center; padding: 34px 0 26px; }
  .hero .mark { font-size: 34px; font-weight: 900; letter-spacing: 0.08em; color: var(--sky-deep); }
  .hero .mark .dot { color: var(--gold); }
  .hero .sub { font-size: 13px; color: var(--ink-faint); margin-top: 6px; letter-spacing: 0.02em; }
  .hero .rule { width: 44px; height: 3px; background: var(--gold); border-radius: 2px; margin: 16px auto 0; }

  .menu { display:flex; flex-direction: column; gap: 12px; max-width: 460px; margin: 8px auto 0; }
  .menu-btn { display:flex; align-items:center; gap: 16px; background: var(--card); border: 1px solid var(--line);
    border-radius: var(--radius); padding: 20px 22px; text-align:left; transition: transform .12s, box-shadow .12s, border-color .12s; }
  .menu-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(43,107,165,.10); border-color: #c3dcf0; }
  .menu-btn:disabled { opacity: .55; cursor: default; }
  .menu-btn:disabled:hover { transform:none; box-shadow:none; border-color: var(--line); }
  .menu-btn .ico { font-size: 26px; width: 44px; height: 44px; display:flex; align-items:center; justify-content:center; background: var(--sky-tint); border-radius: 11px; flex:0 0 auto; }
  .menu-btn .txt { flex:1; }
  .menu-btn .txt .t { font-size: 16.5px; font-weight: 800; }
  .menu-btn .txt .d { font-size: 12.5px; color: var(--ink-faint); margin-top: 2px; }
  .menu-btn .arw { color: var(--ink-faint); font-size: 18px; }
  .menu-btn .badge { font-size: 11px; font-weight: 700; color: var(--gold); border: 1px solid var(--gold); border-radius: 5px; padding: 2px 7px; }

  .recent-open { max-width: 460px; margin: 18px auto 0; text-align:center; }
  .recent-open button { border:none; background:none; color: var(--ink-soft); font-size: 13px; font-weight: 600; }
  .recent-open button:hover { color: var(--sky-deep); }

  /* ===== 패널/검색 ===== */
  .panel { background: var(--card); border: 1px solid var(--line); border-radius: var(--radius); padding: 16px; margin-bottom: 14px; }
  .panel h2 { font-size: 15px; font-weight: 700; margin-bottom: 10px; }
  .hint { font-size: 12.5px; color: var(--ink-faint); }

  .ai-box { display:flex; gap:8px; }
  .ai-box input { flex:1; border: 1.5px solid var(--sky); border-radius: 8px; padding: 11px 13px; font: inherit; background:#fff; color: var(--ink); }
  .ai-box input:focus { outline: 2px solid var(--sky); outline-offset: 1px; }
  .ai-answer { margin-top: 10px; background: var(--sky-tint); border-radius: 8px; padding: 11px 13px; font-size: 14px; color: var(--sky-deep); display:none; }
  .ai-examples { display:flex; flex-wrap:wrap; gap:6px; margin-top:10px; }
  .ai-ex { font-size: 12px; background: var(--paper); border:1px solid var(--line); border-radius: 20px; padding: 5px 12px; color: var(--ink-soft); }
  .ai-ex:hover { background: var(--sky-tint); border-color:#c3dcf0; color: var(--sky-deep); }

  .filters { display:flex; flex-wrap: wrap; gap: 8px; align-items: center; }
  .filters select, .filters input[type=text], .filters input[type=number] {
    border: 1px solid var(--line); border-radius: 7px; padding: 7px 9px; font: inherit; font-size: 13.5px; background:#fff; color: var(--ink); }
  .filters input[type=text] { flex: 1 1 140px; min-width: 120px; }
  .filters input[type=number] { width: 84px; }
  .price-label { font-size: 12.5px; font-weight: 700; color: var(--ink-soft); }
  .pricebox { width: 78px !important; }
  .pricebox.sm { width: 62px !important; }
  .tilde { color: var(--ink-faint); font-size: 13px; }
  .price-hint { font-size: 11.5px; color: var(--ink-faint); margin-left: 4px; }

  .btn { display:inline-flex; align-items:center; justify-content:center; gap:6px; border:none; cursor:pointer;
    font: inherit; font-weight: 700; border-radius: 8px; padding: 11px 18px; }
  .btn-primary { background: var(--sky); color:#fff; }
  .btn-primary:hover { background: var(--sky-deep); }
  .btn-ghost { background: var(--sky-tint); color: var(--sky-deep); }
  .btn-ghost:hover { background: #dcebf7; }
  .btn:disabled { opacity: .5; cursor: default; }
  .btn-sm { padding: 6px 12px; font-size: 13px; border-radius: 6px; }

  .count-line { display:flex; justify-content: space-between; align-items:center; margin: 14px 2px 8px; }
  .count-line .cnt { font-size: 13px; color: var(--ink-soft); }

  /* ===== 매물 카드 ===== */
  .cards { display:flex; flex-direction: column; gap: 10px; }
  .card { background: var(--card); border: 1px solid var(--line); border-radius: var(--radius); padding: 14px 16px; position: relative; cursor:pointer; transition: border-color .12s, box-shadow .12s; }
  .card:hover { border-color:#c3dcf0; box-shadow: 0 4px 16px rgba(43,107,165,.07); }
  .card .top { display:flex; justify-content: space-between; gap: 10px; align-items: flex-start; }
  .card .title { font-size: 15.5px; font-weight: 800; letter-spacing: -0.01em; }
  .card .addr { font-size: 12.5px; color: var(--ink-faint); margin-top: 1px; }
  .card .price { font-size: 16px; font-weight: 800; color: var(--sky-deep); margin-top: 7px; }
  .card .price .ttype { font-size: 12px; font-weight: 700; color: #fff; background: var(--sky); border-radius: 4px; padding: 1.5px 7px; margin-right: 7px; vertical-align: 2px; }
  .ttype.t-매매 { background: #3d87c8; }
  .ttype.t-전세 { background: #2e9e6b; }
  .ttype.t-월세 { background: #e08a3c; }
  .ttype.t-혼합 { background: #8a6fc0; }
  .chips { display:flex; flex-wrap: wrap; gap: 5px; margin-top: 9px; }
  .chip { font-size: 12px; background: var(--paper); border: 1px solid var(--line); border-radius: 5px; padding: 2.5px 8px; color: var(--ink-soft); }
  .chip.on { background: var(--sky-tint); border-color: #c3dcf0; color: var(--sky-deep); font-weight: 600; }
  .chip.warn { background: #fdf1ef; border-color: #f0d4d0; color: var(--stamp-red); }
  .violation { display:inline-flex; align-items:center; gap:5px; margin-top:9px; font-size: 12.5px; font-weight: 700;
    color: var(--stamp-red); background: #fdf1ef; border: 1px solid #f0d4d0; border-radius: 6px; padding: 4px 10px; }
  .memo { margin-top: 9px; font-size: 13px; color: var(--ink-soft); background: var(--paper); border-radius: 7px; padding: 9px 11px; white-space: pre-wrap; }
  .idtag { font-size: 11.5px; color: var(--ink-faint); }
  .src-tag { font-size: 11px; font-weight: 700; color: var(--gold); background: #faf6ee; border: 1px solid #e8dcc3; border-radius: 5px; padding: 1.5px 7px; margin-left: 2px; }
  .src-line { font-size: 12.5px; font-weight: 700; color: #b8860b; background: #faf6ee; border: 1px solid #e8dcc3; border-radius: 6px; padding: 3px 9px; margin-top: 5px; display: inline-block; }
  .badge-urgent { font-size: 11px; font-weight: 800; color: #fff; background: var(--stamp-red); border-radius: 5px; padding: 2px 8px; margin-left: 8px; vertical-align: 2px; }
  .chip.move-in { background: #eaf6ee; border-color: #bfe3ca; color: #2e9e6b; font-weight: 700; }
  .stamp { flex: 0 0 auto; font-size: 11px; font-weight: 800; border-radius: 5px; padding: 3px 9px; }
  .stamp.진행중 { color: var(--sky-deep); background: var(--sky-tint); }
  .stamp.계약중 { color: #b8860b; background: #fbf3e0; }
  .stamp.거래완료 { color: var(--stamp-red); background: #fdf1ef; }
  .stamp.보류 { color: var(--ink-faint); background: var(--paper); }
  .card .foot { display:flex; justify-content: space-between; align-items:center; margin-top: 11px; }

  .empty { text-align:center; color: var(--ink-faint); padding: 40px 0; font-size: 14px; }

  /* ===== 상세 페이지 ===== */
  .detail-head { background: var(--card); border:1px solid var(--line); border-radius: var(--radius); padding: 18px 20px; margin-bottom: 14px; }
  .detail-head .dtitle { font-size: 19px; font-weight: 800; }
  .detail-head .daddr { font-size: 13px; color: var(--ink-faint); margin-top: 3px; }
  .detail-head .dprice { font-size: 20px; font-weight: 900; color: var(--sky-deep); margin-top: 10px; }
  .detail-head .dprice .ttype { font-size: 12.5px; font-weight:700; color:#fff; background: var(--sky); border-radius:5px; padding: 2px 8px; margin-right: 8px; vertical-align: 3px; }
  .dtable { background: var(--card); border:1px solid var(--line); border-radius: var(--radius); overflow: hidden; margin-bottom: 14px; }
  .drow { display:flex; border-bottom: 1px solid var(--line); }
  .drow:last-child { border-bottom: none; }
  .drow .dk { flex: 0 0 116px; background: var(--paper); padding: 11px 14px; font-size: 12.5px; font-weight: 700; color: var(--ink-soft); }
  .drow .dv { flex:1; padding: 11px 14px; font-size: 14px; }
  .drow .dv.memo-v { white-space: pre-wrap; color: var(--ink-soft); }

  /* ===== 수정 모달 ===== */
  .modal-bg { display:none; position: fixed; inset: 0; background: rgba(22,50,74,.45); z-index: 100; align-items: flex-start; justify-content: center; overflow-y: auto; padding: 30px 14px; }
  .modal-bg.show { display: flex; }
  .modal { background: var(--card); border-radius: 12px; width: 100%; max-width: 640px; padding: 20px; box-shadow: 0 20px 60px rgba(0,0,0,.25); }
  .modal h2 { font-size: 16px; font-weight: 800; margin-bottom: 4px; }
  .modal .mid { font-size: 12px; color: var(--ink-faint); margin-bottom: 14px; }
  .modal .mgrid { display:grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
  .modal .mitem { display:flex; flex-direction: column; gap: 3px; }
  .modal .mitem.full { grid-column: span 2; }
  .modal .mitem label { font-size: 11.5px; font-weight: 700; color: var(--ink-soft); }
  .modal .mitem input, .modal .mitem textarea, .modal .mitem select { border: 1px solid var(--line); border-radius: 6px; padding: 7px 8px; font: inherit; font-size: 13px; background:#fdfdfe; color: var(--ink); width:100%; }
  .modal .mitem textarea { min-height: 70px; resize: vertical; }
  @media (max-width: 560px) { .modal .mgrid { grid-template-columns: 1fr; } .modal .mitem.full { grid-column: span 1; } }
  .modal .mfoot { display:flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }

  /* settings inputs */
  input.cfg { width: 100%; border: 1px solid var(--line); border-radius: 7px; padding: 10px 11px; font: inherit; font-size: 13px; background:#fdfdfe; color: var(--ink); }
  .row-actions { display:flex; gap:8px; margin-top: 12px; flex-wrap: wrap; }

  /* toast */
  #toast { position: fixed; left: 50%; bottom: 26px; transform: translateX(-50%) translateY(20px); background: var(--ink); color:#fff;
    padding: 11px 20px; border-radius: 9px; font-size: 14px; opacity: 0; pointer-events:none; transition: all .25s; z-index: 200; max-width: 90vw; }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  @media (prefers-reduced-motion: reduce) { #toast, .menu-btn, .card { transition: none; } }

  .spinner { width: 15px; height: 15px; border: 2px solid rgba(255,255,255,.4); border-top-color: #fff; border-radius: 50%; animation: spin .7s linear infinite; display:none; }
  .btn-ghost .spinner { border-color: rgba(43,107,165,.3); border-top-color: var(--sky-deep); }
  .loading .spinner { display: inline-block; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .placeholder-view { text-align:center; padding: 50px 20px; color: var(--ink-faint); }
  .placeholder-view .pico { font-size: 40px; }
  .placeholder-view .pt { font-size: 16px; font-weight: 700; color: var(--ink-soft); margin-top: 12px; }
  .placeholder-view .pd { font-size: 13px; margin-top: 6px; }
</style>
</head>
<body>

<header>
  <div class="head-inner">
    <button class="back-btn" id="backBtn" onclick="goHome()">← 메인</button>
    <div class="head-title" id="headTitle"><span class="logo">ADAM</span> 아담부동산</div>
    <button class="settings-gear" onclick="showView('settings')" title="설정">⚙</button>
  </div>
</header>

<main>

<!-- ===== 메인 ===== -->
<section id="view-home" class="view active">
  <div class="hero">
    <div class="mark">ADAM<span class="dot">.</span></div>
    <div class="sub">아담부동산 업무 시스템</div>
    <div class="rule"></div>
  </div>
  <div class="menu">
    <button class="menu-btn" onclick="showView('maemul')">
      <span class="ico">🏠</span>
      <span class="txt"><span class="t">매물장부</span><span class="d">매물 검색 · 조회 · 수정</span></span>
      <span class="arw">›</span>
    </button>
    <button class="menu-btn" onclick="showView('sonnim')">
      <span class="ico">👤</span>
      <span class="txt"><span class="t">손님장부</span><span class="d">손님 조건 · 이력 · 매칭</span></span>
      <span class="arw">›</span>
    </button>
    <button class="menu-btn" disabled>
      <span class="ico">📒</span>
      <span class="txt"><span class="t">거래장부</span><span class="d">완료된 거래 기록</span></span>
      <span class="badge">준비중</span>
    </button>
  </div>
  <div class="recent-open">
    <button onclick="showRecent()">🕒 최근 본 매물</button>
  </div>
</section>

<!-- ===== 매물장부 ===== -->
<section id="view-maemul" class="view">
  <div class="panel">
    <h2>주관식으로 물어보기</h2>
    <div class="ai-box">
      <input id="aiQuery" placeholder="예) 엘베 있고 남향, 9월 입주 가능한 곳" onkeydown="if(event.key==='Enter')aiSearch()">
      <button id="btnAi" class="btn btn-primary" onclick="aiSearch()"><span class="spinner"></span>AI 검색</button>
    </div>
    <div class="ai-examples">
      <button class="ai-ex" onclick="exSearch(this)">엘베 있는 곳</button>
      <button class="ai-ex" onclick="exSearch(this)">남향 매물</button>
      <button class="ai-ex" onclick="exSearch(this)">주차 되는 곳</button>
      <button class="ai-ex" onclick="exSearch(this)">즉시입주</button>
    </div>
    <div id="aiAnswer" class="ai-answer"></div>
  </div>

  <div class="panel">
    <h2>빠른 필터</h2>
    <div class="filters">
      <select id="q_상태" onchange="renderCards()"><option value="">상태 전체</option><option>진행중</option><option>계약중</option><option>거래완료</option><option>보류</option></select>
      <select id="q_거래유형" onchange="renderCards()"><option value="">유형 전체</option><option>매매</option><option>전세</option><option>월세</option></select>
      <select id="q_엘리베이터" onchange="renderCards()"><option value="">엘베 전체</option><option>O</option><option>X</option><option>미확인</option></select>
      <select id="q_주차" onchange="renderCards()"><option value="">주차 전체</option><option value="가능">주차 가능</option><option value="불가">주차 불가</option></select>
      <input id="q_방수" type="number" min="1" placeholder="방 최소" oninput="renderCards()">
      <input id="q_text" type="text" placeholder="주소·단지명·비고 검색" oninput="renderCards()">
    </div>
    <div class="filters" style="margin-top:8px">
      <span class="price-label">매매가</span>
      <input id="q_매매가_min" type="number" placeholder="최소" oninput="renderCards()" class="pricebox">
      <span class="tilde">~</span>
      <input id="q_매매가_max" type="number" placeholder="최대" oninput="renderCards()" class="pricebox">
      <span class="price-label" style="margin-left:6px">보증금</span>
      <input id="q_보증금_min" type="number" placeholder="최소" oninput="renderCards()" class="pricebox">
      <span class="tilde">~</span>
      <input id="q_보증금_max" type="number" placeholder="최대" oninput="renderCards()" class="pricebox">
      <span class="price-label" style="margin-left:6px">월세</span>
      <input id="q_월세_min" type="number" placeholder="최소" oninput="renderCards()" class="pricebox sm">
      <span class="tilde">~</span>
      <input id="q_월세_max" type="number" placeholder="최대" oninput="renderCards()" class="pricebox sm">
      <span class="price-hint">단위: 만원 (3억=30000)</span>
    </div>
    <div class="filters" style="margin-top:8px">
      <span class="price-label">준공연도</span>
      <input id="q_연식_min" type="number" placeholder="예:1980" oninput="renderCards()" style="width:90px">
      <span class="tilde">~</span>
      <input id="q_연식_max" type="number" placeholder="예:2020" oninput="renderCards()" style="width:90px">
    </div>
  </div>

  <div class="count-line">
    <span class="cnt" id="countLine">-</span>
    <button class="btn btn-ghost btn-sm" id="btnReload" onclick="loadRows(true)"><span class="spinner"></span>새로고침</button>
  </div>
  <div class="cards" id="cards"></div>
  <div class="empty" id="emptyMsg" style="display:none">표시할 매물이 없습니다</div>
</section>

<!-- ===== 매물 상세 ===== -->
<section id="view-detail" class="view">
  <div id="detailBody"></div>
  <div class="row-actions">
    <button class="btn btn-ghost" onclick="showView('maemul')">← 목록으로</button>
    <button class="btn btn-primary" id="btnEditFromDetail" onclick="openEdit(currentDetailId)">✏️ 수정</button>
  </div>
</section>

<!-- ===== 손님장부 (틀) ===== -->
<section id="view-sonnim" class="view">
  <div class="placeholder-view">
    <div class="pico">👤</div>
    <div class="pt">손님장부는 준비 중이에요</div>
    <div class="pd">전화번호로 손님 이력을 관리하고,<br>매물과 자동 매칭하는 기능이 곧 추가됩니다.</div>
  </div>
</section>

<!-- ===== 설정 (숨김, 기어 아이콘으로만) ===== -->
<section id="view-settings" class="view">
  <div class="panel">
    <h2>연결 설정</h2>
    <p class="hint" style="margin-bottom:8px">구글 시트와 연결하는 Apps Script 주소예요. 보통 한 번만 넣으면 됩니다.</p>
    <input class="cfg" id="cfgUrl" placeholder="https://script.google.com/macros/s/........./exec">
    <div class="row-actions">
      <button class="btn btn-primary" onclick="saveConfig()">저장</button>
      <button class="btn btn-ghost" id="btnTest" onclick="testConnection()"><span class="spinner"></span>연결 테스트</button>
    </div>
    <p class="hint" style="margin-top:14px">데이터 저장·수정은 채팅에서 Claude에게 말로 부탁하세요. 이 화면은 조회·수정 전용입니다.</p>
  </div>
</section>

</main>

<div id="toast"></div>

<!-- 수정 모달 -->
<div class="modal-bg" id="editModal">
  <div class="modal">
    <h2 id="editTitle">매물 수정</h2>
    <div class="mid" id="editSub"></div>
    <div class="mgrid" id="editGrid"></div>
    <div class="mfoot">
      <button class="btn btn-ghost" onclick="closeEdit()">취소</button>
      <button class="btn btn-primary" id="btnSaveEdit" onclick="saveEdit()"><span class="spinner"></span>저장</button>
    </div>
  </div>
</div>

<script>
/* ===================== 설정 ===================== */
// 배포된 Apps Script URL을 여기 박아두면 별진이가 설정을 안 건드려도 됨
const DEFAULT_GAS_URL = 'https://script.google.com/macros/s/AKfycbwx-S1_r4zbsi4z3tt1x6Cr8Lj9qhKyJZLKZTOHXsHa0cEdoGP61JfHy7q4_BLxCN4loQ/exec';

const FIELDS = ['주소','단지건물명','동호','거래유형','매매가','보증금','월세','전용면적','공급면적','대지면적','연면적','방수','욕실수','해당층','총층','방향','엘리베이터','주차','건폐율용적률','위반건축물','사용승인일','관리비','입주가능일','입주확정여부','공시가격','공시가기준연도','집주인연락처','세입자연락처','비고'];

let gasUrl = DEFAULT_GAS_URL;
let rows = [];
let aiFilterIds = null;
let currentDetailId = null;
let viewStack = [];
let recentIds = [];

/* ===================== 부팅 ===================== */
(async function init() {
  try {
    const r = await window.storage.get('adam:config');
    if (r && r.value) {
      const cfg = JSON.parse(r.value);
      if (cfg.gasUrl) gasUrl = cfg.gasUrl;
    }
  } catch (e) {}
  document.getElementById('cfgUrl').value = gasUrl;
  try {
    const rr = await window.storage.get('adam:recent');
    if (rr && rr.value) recentIds = JSON.parse(rr.value);
  } catch (e) {}
})();

/* ===================== 뷰 전환 ===================== */
function showView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  const el = document.getElementById('view-' + name);
  if (el) el.classList.add('active');
  const backBtn = document.getElementById('backBtn');
  const gear = document.querySelector('.settings-gear');
  const titles = { home:'<span class="logo">ADAM</span> 아담부동산', maemul:'🏠 매물장부', detail:'🏠 매물 상세', sonnim:'👤 손님장부', settings:'⚙ 설정' };
  document.getElementById('headTitle').innerHTML = titles[name] || 'ADAM';
  backBtn.style.display = (name === 'home') ? 'none' : 'inline-flex';
  gear.style.display = (name === 'home') ? 'inline-flex' : 'none';
  window.scrollTo(0, 0);

  if (name === 'maemul' && rows.length === 0) loadRows(false);
  if (name === 'maemul') renderCards();
}
function goHome() { showView('home'); }

/* ===================== 유틸 ===================== */
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._h); t._h = setTimeout(() => t.classList.remove('show'), 2600);
}
function setLoading(btnId, on) {
  const b = document.getElementById(btnId); if (!b) return;
  b.classList.toggle('loading', on); b.disabled = on;
}
function esc(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
// 매물 고유번호 (헤더가 '알터 매물번호' 또는 '매물번호')
function getId(r) { return r['알터 매물번호'] || r['매물번호'] || ''; }
function uk(n) {
  n = Number(n); if (!n) return '';
  const e = Math.floor(n / 10000), m = n % 10000;
  if (e && m) return e + '억 ' + m.toLocaleString();
  if (e) return e + '억';
  return m.toLocaleString();
}
function fmtYear(v) {
  if (v === '' || v == null) return '';
  let s = String(v);
  // 타임스탬프(1979-09-04T15:00:00.000Z) → 날짜만, KST 보정
  const iso = s.match(/(\d{4})-(\d{2})-(\d{2})T/);
  if (iso) {
    const d = new Date(s);
    const y = d.getFullYear(), m = String(d.getMonth()+1).padStart(2,'0'), day = String(d.getDate()).padStart(2,'0');
    return `${y}-${m}-${day}`;
  }
  // 이미 텍스트면 그대로 (1998 / 1998-01 / 1998-01-15)
  return s;
}
// 거래유형 → 색 클래스
function ttypeClass(t) {
  t = String(t || '');
  if (t.includes('매매') && (t.includes('전세') || t.includes('월세'))) return 't-혼합';
  if (t.includes('매매')) return 't-매매';
  if (t.includes('전세')) return 't-전세';
  if (t.includes('월세')) return 't-월세';
  return '';
}
// 주차 값 파싱: "5/12", 숫자, "가능"/"불가"
function parseParking(v) {
  const s = String(v || '').trim();
  if (s === '불가' || s === '0') return { label: '불가', cls: 'warn', ok: false, ratio: 0 };
  if (s === '가능') return { label: '가능', cls: 'on', ok: true, ratio: null };
  const frac = s.match(/^(\d+(?:\.\d+)?)\s*\/\s*(\d+(?:\.\d+)?)$/);
  if (frac) {
    const n = Number(frac[1]), d = Number(frac[2]);
    return { label: s, cls: 'on', ok: n > 0, ratio: d ? n / d : null };
  }
  const num = Number(s);
  if (!isNaN(num)) return { label: '세대당 ' + s, cls: num >= 1 ? 'on' : (num === 0 ? 'warn' : ''), ok: num > 0, ratio: num };
  return { label: s, cls: '', ok: true, ratio: null };
}
function fmtPrice(r) {
  const t = String(r['거래유형'] || '');
  const parts = [];
  if (r['매매가']) parts.push('매매 ' + uk(r['매매가']));
  if (r['월세']) parts.push((t.includes('월세') ? '월세 ' : '') + uk(r['보증금']) + ' / ' + Number(r['월세']).toLocaleString());
  else if (r['보증금']) parts.push('전세 ' + uk(r['보증금']));
  return parts.join(' · ') || '-';
}

/* ===================== 설정 ===================== */
async function saveConfig() {
  gasUrl = document.getElementById('cfgUrl').value.trim();
  try { await window.storage.set('adam:config', JSON.stringify({ gasUrl })); toast('저장했습니다'); }
  catch (e) { toast('저장 실패: ' + e.message); }
}
async function testConnection() {
  const url = document.getElementById('cfgUrl').value.trim();
  if (!url) return toast('URL을 먼저 입력하세요');
  setLoading('btnTest', true);
  try {
    const res = await fetch(url);
    const data = await res.json();
    if (data.ok) toast('연결 성공! 현재 매물 ' + (data.rows ? data.rows.length : 0) + '건');
    else toast('응답은 왔지만 형식이 다릅니다');
  } catch (e) { toast('연결 실패: 배포 설정(모든 사용자)을 확인하세요'); }
  setLoading('btnTest', false);
}

/* ===================== 데이터 불러오기 ===================== */
async function loadRows(showToast) {
  setLoading('btnReload', true);
  try {
    const res = await fetch(gasUrl);
    const data = await res.json();
    rows = (data.rows || []).filter(r => getId(r));
    aiFilterIds = null;
    document.getElementById('aiAnswer').style.display = 'none';
    renderCards();
    if (showToast) toast('불러왔습니다 (' + rows.length + '건)');
  } catch (e) { toast('불러오기 실패: ' + e.message); }
  setLoading('btnReload', false);
}

/* ===================== 카드 렌더 ===================== */
function renderCards() {
  const gv = id => { const el = document.getElementById(id); return el && el.value !== '' ? Number(el.value) : null; };
  const q = {
    상태: v('q_상태'), 거래유형: v('q_거래유형'), 엘리베이터: v('q_엘리베이터'),
    주차: v('q_주차'), 방수: v('q_방수'), text: (v('q_text')||'').trim().toLowerCase(),
    매매가_min: gv('q_매매가_min'), 매매가_max: gv('q_매매가_max'),
    보증금_min: gv('q_보증금_min'), 보증금_max: gv('q_보증금_max'),
    월세_min: gv('q_월세_min'), 월세_max: gv('q_월세_max'),
    연식_min: gv('q_연식_min'), 연식_max: gv('q_연식_max')
  };
  function v(id){ const e=document.getElementById(id); return e?e.value:''; }
  const inRange = (val, min, max) => {
    if (min === null && max === null) return true;
    const n = Number(val || 0);
    if (min !== null && n < min) return false;
    if (max !== null && n > max) return false;
    return true;
  };
  let list = rows.filter(r => {
    if (q.상태 && String(r['상태']) !== q.상태) return false;
    if (q.거래유형 && !String(r['거래유형']).includes(q.거래유형)) return false;
    if (q.엘리베이터 && String(r['엘리베이터']) !== q.엘리베이터) return false;
    if (q.주차) {
      const p = parseParking(r['주차']);
      if (r['주차'] === '' || r['주차'] == null) return false;
      if (q.주차 === '가능' && !p.ok) return false;
      if (q.주차 === '불가' && p.ok) return false;
    }
    if (q.방수 && Number(r['방수'] || 0) < Number(q.방수)) return false;
    if (!inRange(r['매매가'], q.매매가_min, q.매매가_max)) return false;
    if (!inRange(r['보증금'], q.보증금_min, q.보증금_max)) return false;
    if (!inRange(r['월세'], q.월세_min, q.월세_max)) return false;
    if (q.연식_min !== null || q.연식_max !== null) {
      const m = String(r['사용승인일'] || '').match(/(\d{4})/);
      if (!m) return false;
      const yr = Number(m[1]);
      if (q.연식_min !== null && yr < q.연식_min) return false;
      if (q.연식_max !== null && yr > q.연식_max) return false;
    }
    if (q.text) {
      const hay = [r['주소'], r['단지건물명'], r['동호'], r['비고']].join(' ').toLowerCase();
      if (!hay.includes(q.text)) return false;
    }
    if (aiFilterIds && !aiFilterIds.includes(String(getId(r)))) return false;
    return true;
  });

  const cl = document.getElementById('countLine');
  if (cl) cl.textContent = list.length + '건 표시' + (aiFilterIds ? ' (AI 검색)' : '') + ' / 전체 ' + rows.length + '건';

  const wrap = document.getElementById('cards');
  wrap.innerHTML = '';
  document.getElementById('emptyMsg').style.display = list.length ? 'none' : 'block';

  list.forEach(r => {
    const el = document.createElement('div');
    el.className = 'card';
    el.onclick = () => openDetail(getId(r));
    const title = [r['주소'] ? String(r['주소']).replace(/^서울(특별)?시\s*/, '').replace(/^\S+구\s*/, '') : '', r['단지건물명'], r['동호']].filter(Boolean).join(' ') || r['주소'] || '(이름 없음)';
    const floor = (r['해당층'] || r['총층']) ? `${r['해당층'] || '?'}층/${r['총층'] || '?'}층` : '';
    // 면적: 값 있는 것만, ㎡와 평 같이
    const py = (m) => { const p = Number(m) / 3.3058; return p ? ` (${p.toFixed(1)}평)` : ''; };
    const areas = [];
    if (r['전용면적']) areas.push(`전용 ${r['전용면적']}㎡${py(r['전용면적'])}`);
    if (r['공급면적']) areas.push(`공급 ${r['공급면적']}㎡${py(r['공급면적'])}`);
    if (r['대지면적']) areas.push(`대지 ${r['대지면적']}㎡${py(r['대지면적'])}`);
    if (r['연면적']) areas.push(`연 ${r['연면적']}㎡${py(r['연면적'])}`);
    const room = (r['방수'] || r['욕실수']) ? `방${r['방수'] || '?'}·화${r['욕실수'] || '?'}` : '';
    const 엘 = String(r['엘리베이터'] || '');
    const 주 = (r['주차'] !== '' && r['주차'] != null) ? String(r['주차']) : '';
    const 주Cls = parseParking(주);
    const 방향 = String(r['방향'] || '');
    const st = String(r['상태'] || '');
    const 위반 = String(r['위반건축물'] || '') === '해당';
    const 연식 = r['사용승인일'] ? `연식 ${fmtYear(r['사용승인일'])}` : '';
    const 중개 = String(r['+중개사무소'] || '').trim();
    const tclass = ttypeClass(r['거래유형']);
    const id = getId(r);
    const 비고txt = String(r['비고'] || '');
    const 급매 = /급매|초급매/.test(비고txt);
    // 이사확정: 입주확정여부가 "확정"이고 입주가능일이 날짜면
    const 확정일 = (String(r['입주확정여부']||'').includes('확정') && /\d{4}/.test(String(r['입주가능일']||''))) ? r['입주가능일'] : '';

    el.innerHTML = `
      <div class="top">
        <div>
          <div class="title">${esc(title)} <span class="idtag num">${esc(id)}</span></div>
          ${중개 ? `<div class="src-line">🔗 ${esc(중개)} 물건 · 공동중개</div>` : ''}
          <div class="price num">
            <span class="ttype ${tclass}">${esc(r['거래유형'] || '-')}</span>${esc(fmtPrice(r))}
            ${급매 ? `<span class="badge-urgent">급매</span>` : ''}
          </div>
        </div>
        ${st ? `<div class="stamp ${esc(st)}">${esc(st)}</div>` : ''}
      </div>
      <div class="chips">
        ${floor ? `<span class="chip">${esc(floor)}</span>` : ''}
        ${room ? `<span class="chip">${esc(room)}</span>` : ''}
        ${areas.map(a => `<span class="chip">${esc(a)}</span>`).join('')}
        ${방향 ? `<span class="chip">${esc(방향)}</span>` : ''}
        ${연식 ? `<span class="chip">${esc(연식)}</span>` : ''}
        ${엘 ? `<span class="chip ${엘==='O'?'on':엘==='X'?'warn':''}">엘베 ${esc(엘)}</span>` : ''}
        ${주 !== '' ? `<span class="chip ${주Cls.cls}">주차 ${esc(주Cls.label)}</span>` : ''}
        ${확정일 ? `<span class="chip move-in">이사확정 ${esc(확정일)}</span>` : ''}
      </div>
      ${위반 ? `<div class="violation">⚠ 위반건축물</div>` : ''}`;
    wrap.appendChild(el);
  });
}

function exSearch(btn) {
  document.getElementById('aiQuery').value = btn.textContent;
  aiSearch();
}

/* ===================== 상세 ===================== */
function openDetail(id) {
  const r = rows.find(x => String(getId(x)) === String(id));
  if (!r) return;
  currentDetailId = id;
  pushRecent(id);
  const title = [r['단지건물명'], r['동호']].filter(Boolean).join(' ') || r['주소'] || '(이름 없음)';
  const st = String(r['상태'] || '');
  const detailFields = [
    '+중개사무소','주소','단지건물명','동호','거래유형','전용면적','공급면적','대지면적','연면적',
    '방수','욕실수','해당층','총층','방향','엘리베이터','주차','건폐율용적률',
    '위반건축물','사용승인일','관리비','입주가능일','입주확정여부',
    '공시가격','공시가기준연도','집주인연락처','세입자연락처'
  ];
  const labelMap = { '사용승인일':'연식', '+중개사무소':'중개사무소' };
  let rowsHtml = '';
  detailFields.forEach(f => {
    let val = r[f];
    if (val === '' || val == null) return;
    if (f === '사용승인일') val = fmtYear(val);
    if (f === '주차') val = parseParking(val).label;
    if (['전용면적','공급면적','대지면적','연면적'].includes(f)) {
      const p = Number(val) / 3.3058;
      if (p) val = `${val}㎡ (${p.toFixed(1)}평)`;
    }
    const label = labelMap[f] || f;
    rowsHtml += `<div class="drow"><div class="dk">${label}</div><div class="dv">${esc(val)}</div></div>`;
  });
  if (r['비고']) rowsHtml += `<div class="drow"><div class="dk">비고</div><div class="dv memo-v">${esc(r['비고'])}</div></div>`;

  document.getElementById('detailBody').innerHTML = `
    <div class="detail-head">
      <div class="dtitle">${esc(title)} ${st ? `<span class="stamp ${esc(st)}" style="font-size:12px;vertical-align:3px">${esc(st)}</span>` : ''}</div>
      <div class="daddr">${esc(r['주소'] || '')} · <span class="num">${esc(id)}</span> · 등록 ${esc(r['등록일'] || '')}</div>
      <div class="dprice num"><span class="ttype ${ttypeClass(r['거래유형'])}">${esc(r['거래유형'] || '-')}</span>${esc(fmtPrice(r))}</div>
    </div>
    <div class="dtable">${rowsHtml}</div>`;
  showView('detail');
}

/* ===================== 최근 본 매물 ===================== */
async function pushRecent(id) {
  recentIds = [id, ...recentIds.filter(x => x !== id)].slice(0, 10);
  try { await window.storage.set('adam:recent', JSON.stringify(recentIds)); } catch (e) {}
}
async function showRecent() {
  if (rows.length === 0) await loadRows(false);
  if (recentIds.length === 0) return toast('최근 본 매물이 없어요');
  showView('maemul');
  aiFilterIds = recentIds.slice();
  const box = document.getElementById('aiAnswer');
  box.innerHTML = '🕒 최근 본 매물 ' + recentIds.length + '건 &nbsp;<a href="#" onclick="clearAi();return false" style="color:inherit;font-weight:700">해제</a>';
  box.style.display = 'block';
  renderCards();
}

/* ===================== Claude API ===================== */
async function callClaude(prompt) {
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ model: 'claude-sonnet-4-6', max_tokens: 1000, messages: [{ role: 'user', content: prompt }] })
  });
  const data = await res.json();
  if (data.error) throw new Error(data.error.message || 'API 오류');
  return data.content.filter(c => c.type === 'text').map(c => c.text).join('\n');
}
function parseJsonLoose(text) { return JSON.parse(text.replace(/```json|```/g, '').trim()); }

async function aiSearch() {
  const q = document.getElementById('aiQuery').value.trim();
  if (!q) return toast('질문을 입력하세요');
  if (rows.length === 0) await loadRows(false);
  if (rows.length === 0) return toast('매물이 없습니다');
  setLoading('btnAi', true);
  try {
    const slim = rows.map(r => {
      const o = { 매물번호: getId(r) };
      FIELDS.forEach(f => { if (r[f] !== '' && r[f] != null) o[f] = r[f]; });
      return o;
    });
    const prompt = `당신은 부동산 사무실의 매물 검색 도우미입니다. 아래 매물 목록(JSON)에서 질문 조건에 맞는 매물을 찾으세요.
규칙:
- 비고의 자유 텍스트까지 꼼꼼히 읽고 판단하세요 (집 보는 시간, 이사 사정, 조정 여지 등).
- 금액 단위는 만원입니다 (20300 = 2억 300).
- 조건에 딱 맞지 않아도 협의 여지가 있어 보여줄 만한 매물은 포함하되, 이유를 적으세요.
- 응답은 아래 JSON만, 다른 텍스트 없이:
{"ids": ["M001", ...], "answer": "결과 요약과 주의점 두세 문장"}
- 맞는 매물이 없으면 ids는 빈 배열, answer에 이유.

매물 목록:
${JSON.stringify(slim, null, 0)}

질문: ${q}`;
    const out = await callClaude(prompt);
    const j = parseJsonLoose(out);
    aiFilterIds = (j.ids || []).map(String);
    const box = document.getElementById('aiAnswer');
    box.innerHTML = esc(j.answer || '') + ' &nbsp;<a href="#" onclick="clearAi();return false" style="color:inherit;font-weight:700">해제</a>';
    box.style.display = 'block';
    renderCards();
  } catch (e) { toast('AI 검색 실패: ' + e.message); }
  setLoading('btnAi', false);
}
function clearAi() {
  aiFilterIds = null;
  document.getElementById('aiAnswer').style.display = 'none';
  document.getElementById('aiQuery').value = '';
  renderCards();
}

/* ===================== 수정 모달 ===================== */
let editingId = null;
const EDIT_FIELDS = [
  ['상태','select',['진행중','계약중','거래완료','보류']],
  ['주소','text'],['단지건물명','text'],['동호','text'],
  ['거래유형','select',['매매','전세','월세','매매+전세','매매+월세','전세+월세']],
  ['매매가','num'],['보증금','num'],['월세','num'],
  ['전용면적','num'],['공급면적','num'],['대지면적','num'],['연면적','num'],
  ['방수','num'],['욕실수','num'],['해당층','text'],['총층','text'],
  ['방향','text'],
  ['엘리베이터','select',['','O','X','미확인']],
  ['주차','text'],['건폐율용적률','text'],
  ['위반건축물','select',['','없음','해당','미확인']],
  ['사용승인일','text'],['관리비','num'],
  ['입주가능일','text'],
  ['입주확정여부','select',['','확정','협의가능','미정']],
  ['공시가격','num'],['공시가기준연도','num'],
  ['집주인연락처','text'],['세입자연락처','text'],
  ['+중개사무소','text'],
  ['비고','textarea']
];
function openEdit(id) {
  const r = rows.find(x => String(getId(x)) === String(id));
  if (!r) return toast('매물을 찾을 수 없습니다');
  editingId = id;
  document.getElementById('editTitle').textContent = (r['단지건물명'] || r['주소'] || '매물') + ' 수정';
  document.getElementById('editSub').textContent = id + ' · 등록 ' + (r['등록일'] || '');
  const grid = document.getElementById('editGrid');
  grid.innerHTML = '';
  EDIT_FIELDS.forEach(([name, type, opts]) => {
    const item = document.createElement('div');
    item.className = 'mitem' + (type === 'textarea' ? ' full' : '');
    const val = r[name] == null ? '' : r[name];
    let control;
    if (type === 'select') control = `<select id="e_${name}">${opts.map(o => `<option ${String(o)===String(val)?'selected':''}>${o}</option>`).join('')}</select>`;
    else if (type === 'textarea') control = `<textarea id="e_${name}">${esc(val)}</textarea>`;
    else control = `<input id="e_${name}" ${type==='num'?'type="number" step="any"':''} value="${esc(val)}">`;
    item.innerHTML = `<label>${name}</label>${control}`;
    grid.appendChild(item);
  });
  document.getElementById('editModal').classList.add('show');
}
function closeEdit() { document.getElementById('editModal').classList.remove('show'); editingId = null; }
async function saveEdit() {
  if (!editingId) return;
  const data = {};
  EDIT_FIELDS.forEach(([name]) => { const el = document.getElementById('e_' + name); if (el) data[name] = el.value; });
  setLoading('btnSaveEdit', true);
  try {
    const res = await fetch(gasUrl, { method: 'POST', body: JSON.stringify({ action: 'update', 매물번호: editingId, data }) });
    const out = await res.json();
    if (!out.ok) throw new Error(out.error || '수정 실패');
    const r = rows.find(x => String(getId(x)) === String(editingId));
    if (r) Object.keys(data).forEach(k => r[k] = data[k]);
    toast(editingId + ' 수정 완료');
    closeEdit();
    renderCards();
    if (document.getElementById('view-detail').classList.contains('active')) openDetail(editingId);
  } catch (e) { toast('수정 실패: ' + e.message); }
  setLoading('btnSaveEdit', false);
}
</script>
